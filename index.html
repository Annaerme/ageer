<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Reddingsclub Aegir Gent — trainen, redden en samenkomen in het water." />
  <title>Aegir Gent | Reddingsclub</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="icon" href="/images/logo/favicon.svg" type="image/svg+xml" />
  <style>
    /* ── Homepage only ── */
    body { background: var(--navy-deep); }

    .home-bg {
      position: fixed; inset: 0; z-index: 0;
      background: url('/images/banner/aegirbanner009.jpg') center / cover no-repeat;
    }
    .home-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        160deg,
        rgba(8,14,32,.55) 0%,
        rgba(8,14,32,.82) 50%,
        rgba(8,14,32,.96) 100%
      );
    }

    /* Exactly one viewport tall — stats always in view */
    .home-stage {
      position: relative; z-index: 1;
      height: 100svh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .home-hero {
      flex: 1;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: calc(var(--nav-h) + 2rem) 0 2.5rem;
    }
    .home-hero-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 2.5rem; width: 100%;
    }
    .home-eyebrow {
      display: inline-flex; align-items: center; gap: 12px;
      font-size: .68rem; font-weight: 700; letter-spacing: .22em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem;
    }
    .home-eyebrow::before {
      content: ''; display: block; width: 32px; height: 2px;
      background: var(--gold); border-radius: 2px;
    }
    .home-h1 {
      font-family: var(--font-head);
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: .98;
      color: white;
      margin-bottom: 0;
    }
    .home-h1 em { color: var(--gold); font-style: normal; display: block; }

    /* Stats strip pinned to bottom of viewport */
    .home-stats {
      flex-shrink: 0;
      position: relative; z-index: 1;
      background: rgba(10,18,38,.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,.06);
    }

    @media (max-width: 768px) {
      .home-hero { padding-bottom: 2rem; }
      .home-h1 { font-size: clamp(2.5rem, 12vw, 4.5rem); }
    }
  </style>
</head>
<body>
  <div id="site-nav"></div>

  <div class="home-bg" aria-hidden="true"></div>

  <div class="home-stage">
    <div class="home-hero">
      <div class="home-hero-inner">
        <div class="home-eyebrow">Reddingszwemmen · Gent</div>
        <h1 class="home-h1">
          Reddingsclub
          <em>Aegir Gent.</em>
        </h1>
      </div>
    </div>

    <div class="home-stats">
      <div id="homepage-stats" class="stat-strip-inner" style="max-width:var(--max-w);margin:0 auto">
        <div class="stat-block"><div class="stat-n">40+</div><div class="stat-l">Jaar actief</div></div>
        <div class="stat-block"><div class="stat-n">100+</div><div class="stat-l">Actieve leden</div></div>
        <div class="stat-block"><div class="stat-n">7</div><div class="stat-l">Niveaugroepen</div></div>
        <div class="stat-block"><div class="stat-n">10+</div><div class="stat-l">Disciplines</div></div>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="/js/components/nav.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/main.js"></script>
  <script>
  (()=>{
    const SB='https://wlmehcbxeseigxwougwd.supabase.co';
    const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsbWVoY2J4ZXNlaWd4d291Z3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTUwMzQsImV4cCI6MjA5NjMzMTAzNH0.hzplILom0POZIbIuTIv6op9QSUl8PQdKdYg5Q0dh4_8';
    fetch(`${SB}/rest/v1/homepage_stats?order=volgorde.asc`,{headers:{apikey:KEY}})
      .then(r=>r.json())
      .then(stats=>{
        if(!stats||!stats.length) return;
        document.getElementById('homepage-stats').innerHTML=stats.map(s=>
          `<div class="stat-block"><div class="stat-n">${s.waarde}</div><div class="stat-l">${s.label}</div></div>`
        ).join('');
      })
      .catch(()=>{});
  })();
  </script>
</body>
</html>
