<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikel | Aegir Gent</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="icon" href="/images/logo/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div id="site-nav"></div>
  <div class="page">

    <section class="page-hero" id="artikel-hero">
      <div class="wrap">
        <nav class="breadcrumb">
          <a href="/pages/nieuws/">Nieuws</a><span>›</span>
          <span aria-current="page" id="artikel-breadcrumb">Artikel</span>
        </nav>
        <div id="artikel-meta" style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem"></div>
        <h1 id="artikel-titel">Laden…</h1>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:4rem;align-items:start">
          <div id="artikel-body" style="max-width:680px">
            <div style="text-align:center;padding:3rem;color:var(--text-muted)">Artikel wordt geladen…</div>
          </div>
          <aside>
            <div class="info-box">
              <h4>Meer nieuws</h4>
              <div id="andere-artikels" style="margin-top:.75rem;display:flex;flex-direction:column;gap:.5rem">
                <div style="font-size:.85rem;color:var(--text-muted)">Laden…</div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>

  </div>
  <div id="site-footer"></div>
  <script src="/js/components/nav.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/main.js"></script>
  <script>
const SB  = 'https://wlmehcbxeseigxwougwd.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsbWVoY2J4ZXNlaWd4d291Z3dkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTUwMzQsImV4cCI6MjA5NjMzMTAzNH0.hzplILom0POZIbIuTIv6op9QSUl8PQdKdYg5Q0dh4_8';

const CAT_LABELS = { club:'Club', trainingen:'Trainingen', competitie:'Competitie', opleiding:'Opleiding', activiteit:'Activiteit' };

function sbFetch(qs) {
  return fetch(`${SB}/rest/v1/${qs}`, { headers: { apikey: KEY } }).then(r => r.json());
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  return d.toLocaleDateString('nl-BE', { day:'numeric', month:'long', year:'numeric' });
}

function nl2html(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .split(/\n{2,}/)
    .map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`)
    .join('');
}

const params = new URLSearchParams(location.search);
const id = params.get('id');

if (!id) {
  document.getElementById('artikel-titel').textContent = 'Artikel niet gevonden';
  document.getElementById('artikel-body').innerHTML = '<p><a href="/pages/nieuws/" style="color:var(--navy)">← Terug naar nieuws</a></p>';
} else {
  sbFetch(`nieuws_items?id=eq.${id}&gepubliceerd=eq.true`).then(data => {
    if (!data || !data[0]) {
      document.getElementById('artikel-titel').textContent = 'Artikel niet gevonden';
      document.getElementById('artikel-body').innerHTML = '<p><a href="/pages/nieuws/" style="color:var(--navy)">← Terug naar nieuws</a></p>';
      return;
    }
    const art = data[0];
    document.title = `${art.titel} | Aegir Gent`;
    document.getElementById('artikel-breadcrumb').textContent = art.titel;
    document.getElementById('artikel-titel').textContent = art.titel;
    document.getElementById('artikel-meta').innerHTML = `
      <span class="article-date">${fmtDate(art.datum)}</span>
      <span class="article-tag">${CAT_LABELS[art.categorie] || art.categorie}</span>
    `;
    document.getElementById('artikel-body').innerHTML = nl2html(art.inhoud || art.samenvatting || '') +
      `<p style="margin-top:2rem"><a href="/pages/nieuws/" style="color:var(--navy);font-weight:600">← Terug naar nieuws</a></p>`;
  });

  sbFetch(`nieuws_items?gepubliceerd=eq.true&id=neq.${id}&order=datum.desc&limit=5`).then(data => {
    if (!data || !data.length) { document.getElementById('andere-artikels').innerHTML = ''; return; }
    document.getElementById('andere-artikels').innerHTML = data.map(a =>
      `<a href="/pages/nieuws/artikel.html?id=${a.id}" style="display:block;text-decoration:none;font-size:.85rem;color:var(--navy);font-weight:500;padding:.3rem 0;border-bottom:1px solid var(--border)">${a.titel}<br><small style="color:var(--text-muted);font-weight:400">${fmtDate(a.datum)}</small></a>`
    ).join('');
  });
}
  </script>
</body>
</html>
